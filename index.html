<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Malik | Cloud DevOps</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #0f2027, #134e4a, #10b981);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      color: white;
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      padding: 40px;
      border-radius: 20px;
      backdrop-filter: blur(12px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
      text-align: center;
      width: 90%;
      max-width: 420px;
      animation: float 4s ease-in-out infinite;
    }

    /* Floating */
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-15px); }
      100% { transform: translateY(0px); }
    }

    /* CAT IMAGE */
    .profile img {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #10b981;
      box-shadow: 0 0 20px rgba(16, 185, 129, 0.7);
      animation: glow 3s infinite;
    }

    @keyframes glow {
      0% { box-shadow: 0 0 10px #10b981; }
      50% { box-shadow: 0 0 25px #34d399; }
      100% { box-shadow: 0 0 10px #10b981; }
    }

    h1 {
      font-size: 26px;
      margin: 10px 0;
    }

    h3 {
      font-size: 16px;
      margin-bottom: 15px;
      color: #a7f3d0;
    }

    p {
      font-size: 15px;
      line-height: 1.6;
    }

    .skills {
      margin-top: 15px;
      font-size: 14px;
      color: #d1fae5;
    }

    /* 👋 WAVE */
    .wave {
      display: inline-block;
      animation: wave 2s infinite;
      transform-origin: 70% 70%;
    }

    @keyframes wave {
      0% { transform: rotate(0deg); }
      15% { transform: rotate(15deg); }
      30% { transform: rotate(-10deg); }
      45% { transform: rotate(15deg); }
      60% { transform: rotate(-5deg); }
      75% { transform: rotate(10deg); }
      100% { transform: rotate(0deg); }
    }

    /* 🚀 Rocket + Fire */
    .rocket-container {
      display: inline-block;
      position: relative;
      animation: fly 2s ease-in-out infinite;
    }

    @keyframes fly {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
      100% { transform: translateY(0px); }
    }

    .fire {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: -12px;
      width: 8px;
      height: 15px;
      background: orange;
      border-radius: 50%;
      animation: fire 0.3s infinite alternate;
    }

    @keyframes fire {
      0% {
        height: 10px;
        background: orange;
      }
      100% {
        height: 18px;
        background: red;
      }
    }

  </style>
</head>

<body>

  <div class="card">

    <!-- Real cat image -->
    <div class="profile">
      <img src="cat.png" alt="Coding Cat">
    </div>

    <h1><span class="wave">👋</span> Hello, I'm Malik</h1>

    <h3>
      <span class="rocket-container">
        🚀
      </span>
      Aspiring Cloud DevOps Engineer
    </h3>

    <p>
      My names are Adebowale Malik Adedeji, a Cloud DevOps in training,
      currently learning at TechCrush Cohort 6.
    </p>

    <div class="skills">
      <strong>Skills:</strong> CI/CD • Cloud Deployment • Automation • Containerization
    </div>

  </div>

</body>
</html>
